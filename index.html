<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Analysis with R: From Basics to Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>

<style>
  :root {
    --cream: #F7F3EC; --ink: #1A1612; --forest: #1a5276; 
    --sage: #2980b9; --moss: #d4e6f1; --amber: #D4820A;
    --amber-light: #FFF0CC; --red: #C0392B; --red-light: #FDECEA;
    --code-bg: #2d2d2d; --code-fg: #cccccc; --border: #DDD5C8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; display: grid; grid-template-columns: 280px 1fr; grid-template-rows: auto auto 1fr; }
  header { grid-column: 1 / -1; background: var(--forest); color: var(--cream); padding: 18px 36px; display: flex; align-items: center; gap: 20px; border-bottom: 4px solid var(--sage); }
  .logo { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
  .logo span { color: var(--moss); }
  .tagline { font-size: 13px; color: var(--moss); font-weight: 300; letter-spacing: 0.05em; margin-left: auto; }
  #webr-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--moss); background: rgba(255,255,255,0.08); padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #888; transition: background 0.4s; }
  .status-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
  .status-dot.ready { background: #2ecc71; }
  .status-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
  .progress-bar-wrap { grid-column: 1 / -1; background: var(--moss); height: 4px; }
  .progress-bar-fill { height: 100%; background: var(--forest); transition: width 0.5s ease; }
  aside { background: #fff; border-right: 1px solid var(--border); padding: 28px 0; overflow-y: auto; }
  .sidebar-label { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #999; padding: 0 24px; margin-bottom: 12px; }
  .lesson-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 24px; background: none; border: none; cursor: pointer; text-align: left; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); transition: background 0.15s; position: relative; }
  .lesson-btn:hover { background: var(--cream); }
  .lesson-btn.active { background: var(--cream); color: var(--forest); font-weight: 500; }
  .lesson-btn.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--forest); }
  .lesson-num { width: 24px; height: 24px; border-radius: 50%; background: var(--moss); color: var(--forest); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .lesson-btn.active .lesson-num { background: var(--forest); color: #fff; }
  .lesson-btn.done .lesson-num { background: var(--sage); color: #fff; }
  .lesson-title { line-height: 1.3; }
  .lesson-sub { font-size: 11px; color: #999; font-weight: 300; display: block; }
  main { display: flex; flex-direction: column; overflow: hidden; }
  .lesson-area { flex: 1; overflow-y: auto; padding: 40px 48px; max-width: 860px; }
  .lesson-header { margin-bottom: 28px; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  .lesson-category { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sage); margin-bottom: 6px; }
  h1 { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 700; line-height: 1.15; color: var(--ink); margin-bottom: 12px; }
  .lesson-desc { font-size: 16px; color: #555; line-height: 1.7; font-weight: 300; max-width: 640px; }
  .content-block { margin-bottom: 28px; animation: fadeUp 0.4s ease; }
  .content-block p { font-size: 15px; line-height: 1.8; color: #333; margin-bottom: 12px; }
  .callout { background: var(--amber-light); border-left: 4px solid var(--amber); padding: 14px 18px; border-radius: 0 8px 8px 0; font-size: 14px; color: #5a4000; margin-bottom: 20px; }
  .callout strong { color: var(--amber); }
  .exercise { background: #fff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); animation: fadeUp 0.4s ease; }
  .exercise-header { background: var(--forest); color: #fff; padding: 12px 18px; display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; }
  .ex-label { color: var(--moss); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  
  .code-editor-container { width: 100%; min-height: 220px; border-radius: 4px; border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  
  .run-bar { background: #1a1a1a; padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #333; }
  .btn-run { background: var(--sage); color: #fff; border: none; padding: 8px 22px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background 0.2s, transform 0.1s; }
  .btn-run:hover { background: var(--forest); }
  .btn-run:active { transform: scale(0.97); }
  .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-reset { background: none; border: 1px solid #444; color: #888; padding: 7px 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .btn-reset:hover { border-color: #888; color: #ccc; }
  .run-hint { color: #555; font-size: 11px; margin-left: auto; font-family: 'JetBrains Mono', monospace; }
  .output-area { border-top: 1px solid #333; background: #111; min-height: 60px; padding: 14px 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.7; color: #aaa; display: none; white-space: pre-wrap; word-break: break-word; }
  .output-area.visible { display: block; }
  .output-area.success { color: #89d185; }
  .output-area.error-out { color: #f48771; }
  .output-area.loading-out { color: #888; }
  .output-plot { border-top: 1px solid #333; background: #fff; display: none; padding: 16px; text-align: center; }
  .output-plot.visible { display: block; }
  .output-plot img { max-width: 100%; border-radius: 6px; }
  .quiz-block { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 28px; animation: fadeUp 0.4s ease; }
  .quiz-q { font-family: 'Fraunces', serif; font-size: 17px; margin-bottom: 16px; color: var(--ink); }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; background: var(--cream); font-family: 'JetBrains Mono', monospace; }
  .quiz-opt:hover { border-color: var(--sage); background: var(--moss); }
  .quiz-opt.correct { border-color: var(--sage); background: #e8f5e9; color: #27ae60; }
  .quiz-opt.wrong { border-color: var(--red); background: var(--red-light); color: var(--red); }
  .quiz-feedback { margin-top: 14px; font-size: 14px; padding: 10px 14px; border-radius: 6px; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct { background: #e8f5e9; color: #27ae60; }
  .quiz-feedback.wrong { background: var(--red-light); color: var(--red); }
  .nav-buttons { padding: 20px 48px; display: flex; gap: 12px; border-top: 1px solid var(--border); background: #fff; }
  .btn-nav { padding: 10px 24px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 2px solid var(--forest); }
  .btn-nav.primary { background: var(--forest); color: #fff; }
  .btn-nav.primary:hover { background: #113851; }
  .btn-nav.secondary { background: transparent; color: var(--forest); }
  .btn-nav.secondary:hover { background: var(--moss); }
  .hidden { display: none; }
  code { font-family: 'JetBrains Mono', monospace; background: var(--moss); color: var(--forest); padding: 2px 6px; border-radius: 4px; font-size: 0.88em; }
  h3 { font-family: 'Fraunces', serif; font-size: 20px; margin-bottom: 10px; color: var(--ink); }
</style>
</head>
<body>

<header>
  <div class="logo">Data<span>R</span></div>
  <div class="tagline">From Basics to Mastery — Powered by WebR</div>
  <div id="webr-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Booting R Engine...</span>
  </div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress-bar" style="width:11%"></div>
</div>

<aside id="sidebar-menu">
  <div class="sidebar-label">Module 1: Foundations</div>
  <button class="lesson-btn active" onclick="goLesson(0)"><div class="lesson-num" id="num-0">1</div><div class="lesson-title">Variables & Types<span class="lesson-sub">The building blocks</span></div></button>
  <button class="lesson-btn" onclick="goLesson(1)"><div class="lesson-num" id="num-1">2</div><div class="lesson-title">Vectors<span class="lesson-sub">Grouping data together</span></div></button>
  <button class="lesson-btn" onclick="goLesson(2)"><div class="lesson-num" id="num-2">3</div><div class="lesson-title">Data Frames & Files<span class="lesson-sub">Reading CSV datasets</span></div></button>
  
  <div class="sidebar-label" style="margin-top:20px;">Module 2: Wrangling</div>
  <button class="lesson-btn" onclick="goLesson(3)"><div class="lesson-num" id="num-3">4</div><div class="lesson-title">Core dplyr Verbs<span class="lesson-sub">Filter, Select, Arrange</span></div></button>
  <button class="lesson-btn" onclick="goLesson(4)"><div class="lesson-num" id="num-4">5</div><div class="lesson-title">Aggregating Data<span class="lesson-sub">Mutate & Summarize</span></div></button>
  <button class="lesson-btn" onclick="goLesson(5)"><div class="lesson-num" id="num-5">6</div><div class="lesson-title">Reshaping Data<span class="lesson-sub">tidyr: pivot_longer</span></div></button>
  
  <div class="sidebar-label" style="margin-top:20px;">Module 3: Visualisation</div>
  <button class="lesson-btn" onclick="goLesson(6)"><div class="lesson-num" id="num-6">7</div><div class="lesson-title">ggplot2 Foundations<span class="lesson-sub">The Grammar of Graphics</span></div></button>
  <button class="lesson-btn" onclick="goLesson(7)"><div class="lesson-num" id="num-7">8</div><div class="lesson-title">Advanced Plots<span class="lesson-sub">Facets, Themes & Styling</span></div></button>
  
  <div class="sidebar-label" style="margin-top:20px;">Final Challenge</div>
  <button class="lesson-btn" onclick="goLesson(8)"><div class="lesson-num" id="num-8">9</div><div class="lesson-title">The Sandbox<span class="lesson-sub">Independent Analysis</span></div></button>
</aside>

<main>
  <div class="lesson-area" id="lesson-area"></div>
  <div class="nav-buttons">
    <button class="btn-nav secondary hidden" id="btn-prev" onclick="prevLesson()">&#8592; Previous</button>
    <button class="btn-nav primary" id="btn-next" onclick="nextLesson()">Next Lesson &#8594;</button>
  </div>
</main>

<script type="module">
import { WebR } from 'https://webr.r-wasm.org/v0.4.2/webr.mjs';

let webR = null;
let webRReady = false;
let webRLoading = false;
let webRInitPromise = null;

const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

function initWebR() {
  if (webRReady) return Promise.resolve();
  if (webRInitPromise) return webRInitPromise;
  webRLoading = true;
  statusDot.className = 'status-dot loading';
  statusText.textContent = 'Loading R Engine...';
  webR = new WebR();
  
  webRInitPromise = webR.init().then(async () => {
    statusText.textContent = 'Installing tidyverse packages...';
    // Included tidyr for pivot_longer
    await webR.installPackages(['dplyr', 'ggplot2', 'tidyr']);
    
    statusText.textContent = 'Preparing local files...';
    // Generate datasets and save them as CSV files to the browser's virtual filesystem
    await webR.evalRVoid(`
      set.seed(42)
      # 1. Global Demographics Dataset
      regions <- c("Asia", "Europe", "Africa", "Americas")
      global_data <- data.frame(
        Country = paste("Country", 1:200),
        Region = sample(regions, 200, replace = TRUE),
        Population = round(runif(200, 1e6, 1.5e8)),
        Life_Expectancy = round(rnorm(200, mean = 70, sd = 8), 1),
        GDP_Per_Capita = round(rnorm(200, mean = 25000, sd = 15000))
      )
      global_data$GDP_Per_Capita <- ifelse(global_data$GDP_Per_Capita < 1000, 1000, global_data$GDP_Per_Capita)
      write.csv(global_data, "global_demographics.csv", row.names = FALSE)

      # 2. Wide Format Sales Dataset (for tidyr pivot_longer lesson)
      sales_wide <- data.frame(
        Store = c("Store_A", "Store_B", "Store_C"),
        Year_2021 = c(15000, 22000, 18000),
        Year_2022 = c(16500, 24000, 17500),
        Year_2023 = c(18000, 26500, 19000)
      )
      write.csv(sales_wide, "store_sales_wide.csv", row.names = FALSE)
    `);

    webRReady = true;
    webRLoading = false;
    statusDot.className = 'status-dot ready';
    statusText.textContent = 'R Environment Ready';
  }).catch(e => {
    statusDot.className = 'status-dot error';
    statusText.textContent = 'Failed to load';
    throw e;
  });
  return webRInitPromise;
}

const lessons = [
  {
    category: 'Lesson 1', title: 'Variables & Data Types',
    desc: "Welcome! To analyze data, we first need to store it. In R, we store information inside 'variables' using the assignment operator <code>&lt;-</code>.",
    content: `<div class="content-block">
      <p>R supports various data types: <strong>Numeric</strong> (numbers), <strong>Character</strong> (text wrapped in quotes), and <strong>Logical</strong> (TRUE or FALSE).</p>
      <div class="callout"><strong>📝 Your Task:</strong> In the editor below, create three variables representing a person's profile, then print them out. Follow the instructions in the comments.</div>
    </div>`,
    exercises: [{ 
      label: 'Create Your Profile', 
      code: `# 1. Assign your name (as a character string) to a variable called 'my_name'\n\n\n# 2. Assign your age (as a numeric) to a variable called 'my_age'\n\n\n# 3. Print 'my_name' by typing it on a new line\n\n`, 
      hint: 'Remember to wrap text in "quotes" and use the <- arrow!', 
      isPlot: false 
    }],
    quiz: { q: 'Which of the following creates a valid Character (string) variable in R?', options: ['city <- London', 'city = "London"', 'city <- "London"', 'Both B and C are correct'], correctIdx: 3, feedback: 'Correct! While <- is the standard convention in R, = also technically works for assignment.' }
  },
  {
    category: 'Lesson 2', title: 'Vectors',
    desc: "A single number isn't enough for data science. We need to group data together. A vector is a sequence of data elements of the same basic type.",
    content: `<div class="content-block">
      <p>We create vectors using the combine function: <code>c()</code>.</p>
      <div class="callout"><strong>📝 Your Task:</strong> Create vectors to hold the populations of different cities, and calculate the total using <code>sum()</code>.</div>
    </div>`,
    exercises: [{ 
      label: 'Grouping Data', 
      code: `# 1. Create a vector called 'city_pops' containing the numbers: 8000000, 3500000, and 2100000\n\n\n# 2. Use the sum() function on your 'city_pops' vector to find the total population\n\n`, 
      hint: 'Type sum(city_pops) on the last line.', 
      isPlot: false 
    }],
    quiz: { q: 'What happens if you try to put a number and a character in the same vector, like c(10, "Apple")?', options: ['It causes an error.', 'R converts the number 10 into the character string "10".', 'R converts "Apple" into a number.', 'It creates a list.'], correctIdx: 1, feedback: 'Correct! Vectors can only hold one data type. R will automatically "coerce" numbers into characters to maintain consistency.' }
  },
  {
    category: 'Lesson 3', title: 'Data Frames & Reading Files',
    desc: "A data frame is essentially a spreadsheet inside R. Each column is a variable, and each row is an observation. Usually, we load these from CSV files.",
    content: `<div class="content-block">
      <p>We have secretly placed a file called <code>"global_demographics.csv"</code> in your virtual folder. Let's practice loading it into R using the <code>read.csv()</code> function.</p>
    </div>`,
    exercises: [{ 
      label: 'Loading a Local File', 
      code: `# 1. Use read.csv() to load "global_demographics.csv" and assign it to a variable called 'my_data'\n\n\n# 2. Use the head() function on 'my_data' to view the first 6 rows\n\n\n# 3. Use the summary() function on 'my_data' to get basic statistics\n\n`, 
      hint: 'Make sure the filename is wrapped in quotes inside read.csv()', 
      isPlot: false 
    }],
    quiz: { q: 'Why is the head() function useful immediately after reading a CSV file?', options: ['It renames the columns.', 'It verifies the data loaded correctly without printing thousands of rows to the screen.', 'It calculates the mean of all numeric columns.', 'It sorts the data alphabetically.'], correctIdx: 1, feedback: 'Correct! Printing an entire dataset can freeze your console. head() gives you a quick, safe preview.' }
  },
  {
    category: 'Lesson 4', title: 'Core dplyr Verbs (Select, Filter, Arrange)',
    desc: "The 'dplyr' package provides a grammar for data manipulation. The most common tasks are isolating rows, picking columns, and sorting data.",
    content: `<div class="content-block">
      <ul>
        <li><code>filter()</code> extracts rows based on logical conditions.</li>
        <li><code>select()</code> extracts specific columns.</li>
        <li><code>arrange()</code> sorts the rows.</li>
      </ul>
      <div class="callout"><strong>📝 Your Task:</strong> Using the <code>global_data</code> dataset (already loaded in the background), isolate specific countries.</div>
    </div>`,
    exercises: [{ 
      label: 'Isolating Data', 
      code: `library(dplyr)\n\n# 1. Use filter() to create 'europe_data' containing only rows where Region == "Europe"\n\n\n# 2. Use arrange() to sort 'europe_data' by Life_Expectancy in descending order.\n# Tip: use arrange(desc(Life_Expectancy))\n\n\n# 3. Print the head() of your sorted data\n\n`, 
      hint: 'Remember to use a double equals sign (==) inside filter!', 
      isPlot: false 
    }],
    quiz: { q: 'Which verb would you use if you only wanted to keep the "Country" and "Population" columns, discarding the rest?', options: ['filter()', 'mutate()', 'select()', 'isolate()'], correctIdx: 2, feedback: 'Correct! select() acts on columns, while filter() acts on rows.' }
  },
  {
    category: 'Lesson 5', title: 'Aggregating Data (Mutate & Summarize)',
    desc: "Now let's create new metrics and calculate summary statistics for different groups. This is where the pipe operator <code>%&gt;%</code> becomes essential.",
    content: `<div class="content-block">
      <ul>
        <li><code>mutate()</code> creates new columns based on existing ones.</li>
        <li><code>group_by()</code> paired with <code>summarize()</code> calculates metrics for specific categories.</li>
      </ul>
    </div>`,
    exercises: [{ 
      label: 'Pipes and Summaries', 
      code: `library(dplyr)\n\n# The pipe %>% passes data from one function to the next.\n# 1. Take 'global_data', pipe it to group_by(Region), then pipe it to summarize()\n# 2. Inside summarize, create a metric called 'avg_life' equal to mean(Life_Expectancy)\n\nregional_stats <- global_data %>% \n  \n\n# Print regional_stats\nprint(regional_stats)`, 
      hint: 'Type group_by(Region) %>% summarize(avg_life = mean(Life_Expectancy))', 
      isPlot: false 
    }],
    quiz: { q: 'What does the pipe operator %>% actually do?', options: ['It adds two numbers together.', 'It passes the result on its left into the first argument of the function on its right.', 'It creates a new column.', 'It filters out missing values (NAs).'], correctIdx: 1, feedback: 'Correct! It makes your code read like a sentence from left to right.' }
  },
  {
    category: 'Lesson 6', title: 'Reshaping Data (tidyr: pivot_longer)',
    desc: "Data often comes in a 'wide' format (e.g., a column for each year). For analysis and plotting, R prefers 'long' format (one column for Year, one for Value).",
    content: `<div class="content-block">
      <p>We use <code>pivot_longer()</code> from the <code>tidyr</code> package to fix this. We have provided a file called <code>"store_sales_wide.csv"</code> to practice on.</p>
    </div>`,
    exercises: [{ 
      label: 'Wide to Long', 
      code: `library(tidyr)\n\n# 1. Read the "store_sales_wide.csv" file into 'sales_data'\n\n\n# 2. View the original wide format using print()\n\n\n# 3. Use pivot_longer(). We want to take columns Year_2021 to Year_2023.\n# We will send their names to a new column "Year", and their values to "Revenue".\nsales_long <- pivot_longer(sales_data, \n                           cols = starts_with("Year"), \n                           names_to = "Year", \n                           values_to = "Revenue")\n\n# 4. Print sales_long to see the transformation!\n\n`, 
      hint: 'Just fill in step 1, 2, and 4. We wrote the tricky pivot_longer syntax for you to study!', 
      isPlot: false 
    }],
    quiz: { q: 'Why do we frequently pivot data into a "long" format?', options: ['It uses less memory on the computer.', 'Most R modeling and plotting functions (like ggplot2) require data in a long, tidy format.', 'It prevents data loss.', 'It allows us to read CSV files faster.'], correctIdx: 1, feedback: 'Correct! ggplot2 is built entirely around "tidy" (long format) data.' }
  },
  {
    category: 'Lesson 7', title: 'ggplot2: The Grammar of Graphics',
    desc: "ggplot2 builds charts layer by layer. You provide the Data, map variables to Aesthetics (aes), and choose a Geometry (geom) to draw the shapes.",
    content: `<div class="content-block">
      <p>Let's map our <code>global_data</code>. We want GDP on the X axis, and Life Expectancy on the Y axis.</p>
      <div class="callout"><strong>⚠️ Rule:</strong> In this web environment, always wrap your final plot variable in the <code>print()</code> command!</div>
    </div>`,
    exercises: [{ 
      label: 'Your First Plot', 
      code: `library(ggplot2)\n\n# 1. Create a ggplot using 'global_data'.\n# 2. In aes(), map x = GDP_Per_Capita, and y = Life_Expectancy\n# 3. Add a scatter plot layer using + geom_point()\n\nmy_plot <- \n\n\n# 4. Print your plot\n\n`, 
      hint: 'ggplot(global_data, aes(x=GDP_Per_Capita, y=Life_Expectancy)) + geom_point()', 
      isPlot: true 
    }],
    quiz: { q: 'In ggplot2 syntax, what symbol is used to add new layers (like a geom or a theme) to the base plot?', options: ['%>%', '&', '+', 'add()'], correctIdx: 2, feedback: 'Correct! You use the + symbol to stack layers on top of each other.' }
  },
  {
    category: 'Lesson 8', title: 'Advanced Plots: Styling & Facets',

    exercises: [{

let currentLesson = 0;
const completed = new Set();

function renderLesson(idx) {
  const L = lessons[idx];
  const area = document.getElementById('lesson-area');
  let html = `<div class="lesson-header"><div class="lesson-category">${L.category}</div><h1>${L.title}</h1><p class="lesson-desc">${L.desc}</p></div>${L.content}`;

  L.exercises.forEach((ex, i) => {
    html += `<div class="exercise" id="ex-${idx}-${i}">
      <div class="exercise-header"><span>💻</span><div><div>${ex.label}</div><div class="ex-label">Interactive Workspace</div></div></div>
      <div class="code-editor-container" id="editor-${idx}-${i}"></div>
      <div class="run-bar">
        <button class="btn-run" onclick="runCode(${idx},${i},${!!ex.isPlot})">▶ Run Code</button>
        <button class="btn-reset" onclick="resetCode(${idx},${i})">↺ Reset</button>
        <span class="run-hint">Ctrl+Enter to run &nbsp;|&nbsp; <strong>Hint:</strong> ${ex.hint}</span>
      </div>
      <div class="output-area" id="out-${idx}-${i}"></div>
      <div class="output-plot" id="plot-${idx}-${i}"></div>
    </div>`;
  });

  const q = L.quiz;
  const safeOptions = q.options.map(opt => opt.replace(/</g, "&lt;").replace(/>/g, "&gt;"));
  
  html += `<div class="quiz-block"><div class="quiz-q">🧠 Knowledge Check: ${q.q}</div><div class="quiz-options">
    ${safeOptions.map((opt, i) => `<div class="quiz-opt" id="qopt-${idx}-${i}" onclick="answerQuiz(${idx},${i})"><code>${['A','B','C','D'][i]}</code> ${opt}</div>`).join('')}
  </div><div class="quiz-feedback" id="qfb-${idx}">${q.feedback}</div></div>`;

  area.innerHTML = html;
  area.scrollTop = 0;

  if (!window.codeEditors) window.codeEditors = {};
  L.exercises.forEach((ex, i) => {
    const editorId = `editor-${idx}-${i}`;
    const editor = ace.edit(editorId);
    editor.setTheme("ace/theme/tomorrow_night_eighties");
    editor.session.setMode("ace/mode/r");
    editor.setOptions({
      fontSize: "14px", fontFamily: "'JetBrains Mono', monospace",
      showPrintMargin: false, wrap: true, highlightActiveLine: true
    });
    
    // Safely inject code
    editor.setValue(ex.code, -1);

    editor.commands.addCommand({
        name: 'run',
        bindKey: {win: 'Ctrl-Enter',  mac: 'Command-Enter'},
        exec: function(editor) {
            runCode(idx, i, !!ex.isPlot);
        }
    });

    window.codeEditors[`${idx}-${i}`] = editor;
  });

  document.querySelectorAll('.lesson-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.getElementById('btn-prev').classList.toggle('hidden', idx === 0);
  document.getElementById('btn-next').textContent = idx === lessons.length - 1 ? '🎉 Finish Course' : 'Next Lesson →';
  document.getElementById('progress-bar').style.width = ((idx + 1) / lessons.length * 100) + '%';
}

window.runCode = async function(lessonIdx, exIdx, isPlot) {
  const code = window.codeEditors[`${lessonIdx}-${exIdx}`].getValue();
  const outEl = document.getElementById(`out-${lessonIdx}-${exIdx}`);
  const plotEl = document.getElementById(`plot-${lessonIdx}-${exIdx}`);

  if (!webRReady) {
    outEl.textContent = 'Booting R environment and installing packages (~15 sec)...';
    outEl.className = 'output-area visible loading-out';
    try { await initWebR(); } catch(e) { outEl.textContent = 'Error: ' + e.message; outEl.className = 'output-area visible error-out'; return; }
  }

  outEl.textContent = 'Computing...';
  outEl.className = 'output-area visible loading-out';
  plotEl.className = 'output-plot';
  try {
    if (isPlot) {
      await webR.evalRVoid(`png_file <- tempfile(fileext=".png"); png(png_file, width=700, height=450, res=96); ${code}; dev.off()`);
      const pngData = await webR.evalR(`readBin(png_file, "raw", file.info(png_file)$size)`);
      const arr = await pngData.toArray();
      const blob = new Blob([new Uint8Array(arr)], { type: 'image/png' });
      plotEl.innerHTML = `<img src="${URL.createObjectURL(blob)}" alt="Data Plot">`;
      plotEl.className = 'output-plot visible';
      outEl.className = 'output-area';
    } else {
      const shelter = await new webR.Shelter();
      try {
        const captured = await shelter.captureR(code, { withAutoprint: true });
        const output = captured.output.filter(o => o.type === 'stdout' || o.type === 'stderr').map(o => o.data).join('\n');
        outEl.textContent = output || '(Command executed successfully, no output generated)';
        outEl.className = 'output-area visible success';
      } finally { shelter.purge(); }
    }
  } catch(e) { outEl.textContent = 'Syntax Error: ' + e.message; outEl.className = 'output-area visible error-out'; }
};

window.resetCode = function(lessonIdx, exIdx) {
  window.codeEditors[`${lessonIdx}-${exIdx}`].setValue(lessons[lessonIdx].exercises[exIdx].code, -1);
  document.getElementById(`out-${lessonIdx}-${exIdx}`).className = 'output-area';
  document.getElementById(`plot-${lessonIdx}-${exIdx}`).className = 'output-plot';
};

window.answerQuiz = function(lessonIdx, optIdx) {
  const q = lessons[lessonIdx].quiz;
  const opts = document.querySelectorAll(`[id^="qopt-${lessonIdx}-"]`);
  const fb = document.getElementById(`qfb-${lessonIdx}`);
  opts.forEach(o => o.style.pointerEvents = 'none');
  opts[optIdx].classList.add(optIdx === q.correctIdx ? 'correct' : 'wrong');
  opts[q.correctIdx].classList.add('correct');
  fb.className = 'quiz-feedback show ' + (optIdx === q.correctIdx ? 'correct' : 'wrong');
  if (optIdx === q.correctIdx) {
    completed.add(lessonIdx);
    document.getElementById(`num-${lessonIdx}`).textContent = '✓';
    document.querySelectorAll('.lesson-btn')[lessonIdx].classList.add('done');
  }
};

window.goLesson = function(idx) { currentLesson = idx; renderLesson(idx); };
window.nextLesson = function() {
  if (currentLesson < lessons.length - 1) { currentLesson++; renderLesson(currentLesson); }
  else {
    document.getElementById('lesson-area').innerHTML = `<div style="text-align:center;padding:60px 20px"><div style="font-size:64px;margin-bottom:20px">🎓</div><h1 style="font-family:'Fraunces',serif;font-size:40px;margin-bottom:16px">Curriculum Complete</h1><p style="color:#555;font-size:17px;max-width:480px;margin:0 auto 28px">You have successfully mastered data wrangling and visualization.</p><button class="btn-nav primary" onclick="goLesson(0)" style="display:inline-block">Review Module 1 ↺</button></div>`;
  }
};
window.prevLesson = function() { if (currentLesson > 0) { currentLesson--; renderLesson(currentLesson); } };

renderLesson(0);
</script>
</body>
</html>
